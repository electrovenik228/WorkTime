services:
  - type: web
    name: worktime
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_TIME_ZONE
        value: "Asia/Bishkek"
      - key: DATABASE_URL
        fromDatabase:
          name: worktime-db
          property: connectionString

databases:
  - name: worktime-db
    plan: free
